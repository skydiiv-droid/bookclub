<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5efe6">
<title>책모임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.min.css">

<style>
:root {
  --bg: #f5efe6;
  --bg-card: #faf6ee;
  --bg-soft: #ede5d3;
  --ink: #1a1815;
  --ink-soft: #5a5450;
  --ink-mute: #8b857e;
  --accent: #8b4513;
  --accent-light: #c4986a;
  --accent-bg: #ead9c0;
  --line: #ddd5c7;
  --line-soft: #e8e0d2;
  --danger: #a83232;
  --success: #4a7c4a;
  --shadow: 0 1px 2px rgba(26,24,21,0.04), 0 4px 12px rgba(26,24,21,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
}

.serif {
  font-family: 'Fraunces', 'Pretendard Variable', serif;
  font-optical-sizing: auto;
  letter-spacing: -0.015em;
  font-weight: 400;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
#app { max-width: 640px; margin: 0 auto; min-height: 100vh; padding: 0; }
.screen { padding: 24px 20px 80px; }

/* Loading */
.loading-screen {
  min-height: 100vh; display: grid; place-items: center;
  color: var(--ink-mute); font-size: 14px;
}
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--line); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Login */
.login {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 40px 24px;
  text-align: center; gap: 32px;
}
.login-mark { font-size: 56px; line-height: 1; margin-bottom: 8px; }
.login h1 { font-size: 40px; font-weight: 400; letter-spacing: -0.02em; }
.login h1 em { font-style: italic; color: var(--accent); }
.login p { color: var(--ink-soft); max-width: 280px; font-size: 14px; }
.google-btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 14px 28px; background: var(--ink); color: #faf6ee;
  border-radius: 999px; font-size: 15px; font-weight: 500;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.google-btn:active { transform: scale(0.97); }
.google-btn svg { width: 18px; height: 18px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--line-soft);
  background: var(--bg); position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 999px;
  display: grid; place-items: center; color: var(--ink-soft);
  transition: background 0.15s ease;
}
.icon-btn:hover { background: var(--bg-soft); }
.icon-btn svg { width: 18px; height: 18px; }
.header-title {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
  letter-spacing: -0.015em;
}
.header-title small { display: block; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.05em; text-transform: uppercase; font-family: 'Pretendard Variable', sans-serif; font-weight: 500; margin-bottom: 2px; }
.user-avatar { width: 32px; height: 32px; border-radius: 999px; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* Club list */
.section-title {
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400;
  letter-spacing: -0.015em; margin-bottom: 4px;
}
.section-sub { color: var(--ink-mute); font-size: 13px; margin-bottom: 24px; }

.club-card {
  background: var(--bg-card); border: 1px solid var(--line-soft);
  border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
  cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease;
  display: block; width: 100%; text-align: left;
}
.club-card:hover { border-color: var(--accent-light); }
.club-card:active { transform: scale(0.99); }
.club-card-title {
  font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500;
  letter-spacing: -0.01em; margin-bottom: 6px; color: var(--ink);
}
.club-card-meta { font-size: 12px; color: var(--ink-mute); display: flex; gap: 12px; }
.club-card-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  background: var(--accent-bg); color: var(--accent);
  border-radius: 999px; font-weight: 500; letter-spacing: 0.02em;
}
.club-card-pending { opacity: 0.6; }
.club-card-pending .club-card-badge { background: var(--line); color: var(--ink-soft); }

/* Actions row */
.actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 24px 0 8px; }
.action-btn {
  padding: 14px; border: 1px dashed var(--line); border-radius: 12px;
  font-size: 13px; color: var(--ink-soft); transition: all 0.15s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn svg { width: 14px; height: 14px; }

/* Toggle */
.view-toggle {
  display: inline-flex; background: var(--bg-soft); border-radius: 999px;
  padding: 3px; gap: 0;
}
.view-toggle button {
  padding: 6px 14px; border-radius: 999px; font-size: 13px;
  color: var(--ink-mute); transition: all 0.2s ease; font-weight: 500;
}
.view-toggle button.active { background: var(--ink); color: var(--bg-card); }

/* Calendar */
.calendar-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 4px 16px;
}
.calendar-month-label {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
  letter-spacing: -0.015em;
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  background: var(--bg-card); border-radius: 14px; padding: 12px 8px;
  border: 1px solid var(--line-soft);
}
.cal-dow {
  text-align: center; font-size: 10px; color: var(--ink-mute);
  padding: 8px 0 4px; letter-spacing: 0.08em; font-weight: 500;
  text-transform: uppercase;
}
.cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start; padding: 6px 2px;
  border-radius: 8px; font-size: 13px; color: var(--ink-soft);
  position: relative; gap: 2px;
  transition: background 0.15s ease;
}
.cal-day.other-month { color: var(--ink-mute); opacity: 0.35; }
.cal-day.today { color: var(--accent); font-weight: 600; }
.cal-day.today::before {
  content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 24px; border-radius: 50%; background: var(--accent-bg); z-index: -1;
}
.cal-day.has-meeting { cursor: pointer; font-weight: 500; color: var(--ink); }
.cal-day.has-meeting:hover { background: var(--bg-soft); }
.cal-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  margin-top: auto; margin-bottom: 2px;
}

/* Meeting list */
.meeting-card {
  background: var(--bg-card); border: 1px solid var(--line-soft);
  border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
  cursor: pointer; transition: border-color 0.15s ease, transform 0.15s ease;
  display: block; width: 100%; text-align: left;
}
.meeting-card:hover { border-color: var(--accent-light); }
.meeting-card:active { transform: scale(0.99); }
.meeting-card.past { opacity: 0.7; }
.meeting-card.past .meeting-status { background: var(--line); color: var(--ink-soft); }
.meeting-date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.meeting-date {
  font-family: 'Fraunces', serif; font-size: 14px; color: var(--accent);
  font-style: italic; letter-spacing: -0.005em;
}
.meeting-status {
  font-size: 10px; padding: 2px 8px; background: var(--accent-bg);
  color: var(--accent); border-radius: 999px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.meeting-title {
  font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500;
  letter-spacing: -0.01em; line-height: 1.3; margin-bottom: 6px;
}
.meeting-meta {
  font-size: 12px; color: var(--ink-mute); display: flex; gap: 12px; flex-wrap: wrap;
}

/* Meeting detail */
.meeting-detail-header {
  padding: 4px 0 24px; border-bottom: 1px solid var(--line-soft); margin-bottom: 24px;
}
.detail-meta-row {
  display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap;
}
.detail-date {
  font-family: 'Fraunces', serif; font-size: 18px; font-style: italic;
  color: var(--accent);
}
.detail-location { color: var(--ink-soft); font-size: 13px; }
.detail-book-title {
  font-family: 'Fraunces', serif; font-size: 30px; font-weight: 400;
  letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 12px;
}
.detail-book-desc {
  color: var(--ink-soft); font-size: 14px; line-height: 1.65;
  white-space: pre-wrap; margin-bottom: 10px;
}
.detail-book-link {
  font-size: 13px; display: inline-flex; align-items: center; gap: 4px;
}
.extra-info-box { margin-top: 14px; padding: 12px 14px; background: var(--bg-soft); border-radius: 10px; font-size: 13px; color: var(--ink-soft); line-height: 1.55; white-space: pre-wrap; }
.extra-info-label { display: inline-block; font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 8px; }
.reflection-stars { color: var(--accent); letter-spacing: 1px; font-size: 11px; }
.star-picker { display: flex; align-items: center; gap: 4px; }
.star-btn { width: 34px; height: 34px; padding: 4px; display: grid; place-items: center; }
.star-btn svg { width: 26px; height: 26px; }
.star-clear { font-size: 12px; color: var(--ink-mute); margin-left: 8px; cursor: pointer; }
.star-clear:hover { color: var(--danger); }
.member-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--line-soft); }
.member-row:first-of-type { border-top: none; }
.member-row .avatar { width: 30px; height: 30px; border-radius: 999px; overflow: hidden; background: var(--bg-soft); display: grid; place-items: center; font-size: 12px; color: var(--ink-mute); flex-shrink: 0; }
.member-row .avatar img { width: 100%; height: 100%; object-fit: cover; }
.member-row .m-name { flex: 1; font-size: 14px; }
.member-row .m-kick { padding: 4px 12px; border-radius: 999px; font-size: 11px; color: var(--danger); border: 1px solid var(--line); }
.danger-zone { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--line-soft); }
.danger-btn { width: 100%; padding: 12px; border-radius: 10px; font-size: 13px; color: var(--danger); border: 1px solid var(--line); background: var(--bg-card); font-weight: 500; }
.danger-btn:hover { border-color: var(--danger); }
.detail-book-author { font-size: 13px; color: var(--ink-mute); margin: -6px 0 12px; }
.detail-book-count { font-size: 12px; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 12px; }
.book-list { display: flex; flex-direction: column; gap: 10px; }
.book-item { display: flex; gap: 12px; padding: 12px; background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 12px; }
.book-thumb { width: 48px; height: 68px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--bg-soft); }
.book-thumb-empty { display: grid; place-items: center; font-size: 22px; }
.book-item-info { flex: 1; min-width: 0; }
.book-item-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; line-height: 1.25; margin-bottom: 3px; }
.book-item-author { font-size: 12px; color: var(--ink-mute); margin-bottom: 4px; }
.book-item-desc { font-size: 12px; color: var(--ink-soft); line-height: 1.4; }
.book-item-link { font-size: 12px; color: var(--accent); display: inline-block; margin-top: 4px; }
/* book editor inside modal */
.book-editor-empty { font-size: 12px; color: var(--ink-mute); padding: 10px 12px; background: var(--bg-soft); border-radius: 8px; }
.book-chip { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 10px; margin-bottom: 6px; }
.book-chip-thumb { width: 32px; height: 44px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--bg-soft); }
.book-chip-info { flex: 1; min-width: 0; }
.book-chip-title { font-size: 13px; font-weight: 500; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-chip-author { font-size: 11px; color: var(--ink-mute); }
.book-chip-remove { width: 24px; height: 24px; border-radius: 999px; background: var(--bg-soft); color: var(--ink-mute); font-size: 12px; flex-shrink: 0; }
.book-chip-remove:hover { background: var(--danger); color: white; }
.book-search-wrap { margin-top: 8px; }
#book-search { width: 100%; padding: 10px 12px; border: 1px solid var(--line); background: var(--bg-card); border-radius: 10px; font-size: 14px; }
#book-search:focus { outline: none; border-color: var(--accent); }
.book-search-loading { font-size: 12px; color: var(--ink-mute); padding: 10px; text-align: center; }
#book-search-results { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; max-height: 280px; overflow-y: auto; }
.book-result { display: flex; gap: 10px; align-items: center; padding: 8px; background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 8px; text-align: left; transition: border-color 0.15s ease; }
.book-result:hover { border-color: var(--accent); }
.book-result-thumb { width: 30px; height: 42px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--bg-soft); }
.book-result-info { flex: 1; min-width: 0; }
.book-result-title { font-size: 13px; font-weight: 500; line-height: 1.2; }
.book-result-author { font-size: 11px; color: var(--ink-mute); }
.book-manual-btn { margin-top: 8px; font-size: 12px; color: var(--accent); font-weight: 500; }
.stats-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
.stat-box { background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 12px; padding: 16px 8px; text-align: center; }
.stat-num { font-size: 28px; color: var(--accent); line-height: 1; margin-bottom: 6px; }
.stat-label { font-size: 11px; color: var(--ink-mute); }
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-row { display: flex; align-items: center; gap: 10px; }
.rank-num { width: 20px; font-family: 'Fraunces', serif; font-size: 14px; color: var(--ink-mute); text-align: center; flex-shrink: 0; }
.rank-name { width: 80px; font-size: 13px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-bar-wrap { flex: 1; height: 8px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
.rank-bar { height: 100%; background: var(--accent-light); border-radius: 999px; transition: width 0.4s ease; }
.rank-count { font-size: 12px; color: var(--ink-soft); width: 32px; text-align: right; flex-shrink: 0; }
.stats-book-list { display: flex; flex-direction: column; gap: 8px; }
.stats-book { display: flex; gap: 10px; align-items: center; padding: 8px; background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 10px; }
.stats-book-thumb { width: 36px; height: 50px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--bg-soft); }
.stats-book-info { flex: 1; min-width: 0; }
.stats-book-title { font-size: 14px; font-weight: 500; line-height: 1.25; }
.stats-book-author { font-size: 11px; color: var(--ink-mute); }
.stats-book-date { font-size: 11px; color: var(--accent); margin-top: 2px; font-style: italic; }

/* Section block */
.detail-section { margin-bottom: 32px; }
.detail-section-title {
  font-size: 12px; color: var(--ink-mute); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}

/* RSVP */
.rsvp-self {
  display: flex; gap: 6px; padding: 12px; background: var(--bg-card);
  border-radius: 12px; border: 1px solid var(--line-soft); margin-bottom: 12px;
}
.rsvp-self button {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 13px;
  background: transparent; color: var(--ink-soft); transition: all 0.15s ease;
  font-weight: 500;
}
.rsvp-self button.active.yes { background: var(--success); color: white; }
.rsvp-self button.active.maybe { background: var(--accent-light); color: white; }
.rsvp-self button.active.no { background: var(--ink-soft); color: white; }

.rsvp-list {
  display: flex; flex-direction: column; gap: 8px;
}
.rsvp-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--bg-card); border-radius: 10px; font-size: 13px;
}
.rsvp-row .avatar {
  width: 24px; height: 24px; border-radius: 999px; overflow: hidden; flex-shrink: 0;
  background: var(--bg-soft);
}
.rsvp-row .avatar img { width: 100%; height: 100%; object-fit: cover; }
.rsvp-name { flex: 1; }
.rsvp-status { font-size: 11px; color: var(--ink-mute); }
.rsvp-status.yes { color: var(--success); }
.rsvp-status.maybe { color: var(--accent); }
.rsvp-status.no { color: var(--ink-mute); }

/* Attendance */
.attendance-check {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--bg-card); border-radius: 10px; margin-bottom: 6px;
  font-size: 13px;
}
.attendance-check label { flex: 1; cursor: pointer; }
.attendance-check input[type=checkbox] {
  width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
}

/* Comments */
.comment {
  padding: 12px 14px; background: var(--bg-card); border-radius: 10px;
  margin-bottom: 8px;
}
.comment-head {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--ink-mute); margin-bottom: 4px;
}
.comment-author { font-weight: 600; color: var(--ink-soft); }
.comment-body { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
.comment-form {
  display: flex; gap: 8px; margin-top: 12px; align-items: flex-end;
}
.comment-form textarea {
  flex: 1; padding: 10px 12px; border: 1px solid var(--line);
  background: var(--bg-card); border-radius: 10px; resize: none;
  min-height: 40px; max-height: 120px; font-size: 14px;
}
.comment-form textarea:focus { outline: none; border-color: var(--accent); }

/* Reflections */
.reflection {
  padding: 14px 16px; background: var(--bg-card); border-radius: 12px;
  border-left: 3px solid var(--accent-light); margin-bottom: 10px;
}
.reflection-author { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
.reflection-body { font-size: 14px; line-height: 1.6; white-space: pre-wrap; font-family: 'Fraunces', serif; font-style: italic; color: var(--ink-soft); }

/* Buttons */
.btn-primary {
  background: var(--ink); color: var(--bg-card); padding: 10px 20px;
  border-radius: 999px; font-size: 13px; font-weight: 500;
  transition: opacity 0.15s ease;
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg-card); color: var(--ink); padding: 8px 14px;
  border-radius: 999px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line);
}
.btn-text {
  font-size: 12px; color: var(--accent); font-weight: 500;
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(26,24,21,0.4);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: var(--bg); width: 100%; max-width: 640px;
  border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto;
  padding: 24px 20px 40px; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal-title {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500;
  letter-spacing: -0.015em; margin-bottom: 4px;
}
.modal-sub { color: var(--ink-mute); font-size: 13px; margin-bottom: 20px; }
.modal-close {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
  border-radius: 999px; background: var(--bg-soft); display: grid; place-items: center;
}

/* Form */
.form-field { margin-bottom: 16px; }
.form-field label {
  display: block; font-size: 12px; color: var(--ink-soft); font-weight: 500;
  margin-bottom: 6px; letter-spacing: 0.02em;
}
.form-field input, .form-field textarea, .form-field select {
  width: 100%; padding: 12px 14px; border: 1px solid var(--line);
  background: var(--bg-card); border-radius: 10px; font-size: 14px;
  transition: border-color 0.15s ease;
}
.form-field input:focus, .form-field textarea:focus, .form-field select:focus {
  outline: none; border-color: var(--accent);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Empty state */
.empty {
  text-align: center; padding: 40px 20px; color: var(--ink-mute);
  font-size: 13px; line-height: 1.6;
}
.empty .serif { font-size: 18px; color: var(--ink-soft); margin-bottom: 8px; display: block; font-style: italic; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--bg-card); padding: 10px 18px;
  border-radius: 999px; font-size: 13px; z-index: 200;
  animation: toastIn 0.25s ease;
}
@keyframes toastIn { from { transform: translate(-50%, 10px); opacity: 0; } }

/* Pending box */
.pending-box {
  background: var(--accent-bg); border-radius: 12px; padding: 14px 16px;
  margin-bottom: 16px; font-size: 13px; color: var(--ink-soft);
}
.pending-box strong { color: var(--accent); display: block; margin-bottom: 8px; font-weight: 600; }
.pending-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-top: 1px solid rgba(139, 69, 19, 0.15);
}
.pending-item:first-of-type { border-top: none; }
.pending-item .avatar { width: 28px; height: 28px; border-radius: 999px; overflow: hidden; }
.pending-item .name { flex: 1; }
.pending-item button { padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 500; }
.pending-approve { background: var(--accent); color: white; }
.pending-reject { color: var(--ink-mute); }

/* Invite code box */
.invite-code-box {
  background: var(--bg-card); border: 1px dashed var(--accent-light);
  border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 16px;
}
.invite-code-box .label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.invite-code-box .code {
  font-family: 'Fraunces', serif; font-size: 28px; letter-spacing: 0.15em;
  color: var(--accent); font-weight: 500;
}

/* Tabs for RSVP/attendance in list */
.mini-tabs {
  display: flex; gap: 4px; font-size: 11px; color: var(--ink-mute);
  margin-bottom: 8px;
}
.locked-notice {
  font-size: 12px; color: var(--ink-mute); padding: 8px 12px;
  background: var(--bg-soft); border-radius: 8px; margin-bottom: 8px;
  text-align: center; font-style: italic;
}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen"><div class="spinner"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import {
  getFirestore, collection, collectionGroup, doc, addDoc, setDoc, getDoc, getDocs,
  updateDoc, deleteDoc, query, where, orderBy, onSnapshot,
  arrayUnion, arrayRemove, serverTimestamp, Timestamp, deleteField
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

// ============================================================
// 1) FIREBASE CONFIG — replace with your own
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyA8d-HUgdShkvh8-9p6ZO93nRHXY7dpbBo",
  authDomain: "bookclub-6b198.firebaseapp.com",
  projectId: "bookclub-6b198",
  storageBucket: "bookclub-6b198.firebasestorage.app",
  messagingSenderId: "941341633308",
  appId: "1:941341633308:web:c489266e57f3385c94e8d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ============================================================
// 2) STATE
// ============================================================
const state = {
  user: null,
  view: 'loading',            // loading | login | clubList | club
  clubs: [],
  pendingClubs: [],
  currentClubId: null,
  currentClub: null,
  meetings: [],
  currentMeetingId: null,
  meetingComments: [],
  meetingReflections: [],
  calendarMode: 'month',       // month | list
  calendarMonth: new Date(),
  unsubs: [],                  // unsubscribe functions for active listeners
  modal: null,                 // null | 'createClub' | 'joinClub' | 'createMeeting' | 'invite' | 'pending'
};

const EDIT_LOCK_DAYS = 7;     // meetings can be edited up to N days after meeting date

// ============================================================
// 3) UTILITIES
// ============================================================
const $app = document.getElementById('app');
const fmtDate = (d) => {
  if (!d) return '';
  const date = d.toDate ? d.toDate() : new Date(d);
  return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
};
const fmtTime = (d) => {
  if (!d) return '';
  const date = d.toDate ? d.toDate() : new Date(d);
  return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
};
const fmtDateShort = (d) => {
  const date = d.toDate ? d.toDate() : new Date(d);
  return `${date.getMonth()+1}월 ${date.getDate()}일 ${['일','월','화','수','목','금','토'][date.getDay()]}요일`;
};
const fmtMonth = (d) => `${d.getFullYear()}년 ${d.getMonth()+1}월`;
const escapeHtml = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const linkify = (s) => escapeHtml(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
const generateInviteCode = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // exclude ambiguous chars
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
};
const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
const renderStars = (n) => '★'.repeat(n) + '☆'.repeat(5 - n);
const avgRatingDisplay = (reflections) => {
  const rated = (reflections || []).filter(r => r.rating > 0);
  if (rated.length === 0) return '';
  const avg = rated.reduce((s, r) => s + r.rating, 0) / rated.length;
  return `<span style="color:var(--accent); font-weight:400; text-transform:none; letter-spacing:0;">평균 ★${avg.toFixed(1)} · ${rated.length}명</span>`;
};
const isPastEditLock = (meetingDate) => {
  const d = meetingDate.toDate ? meetingDate.toDate() : new Date(meetingDate);
  const lock = new Date(d.getTime() + EDIT_LOCK_DAYS * 24 * 60 * 60 * 1000);
  return new Date() > lock;
};
const isPastMeeting = (meetingDate) => {
  const d = meetingDate.toDate ? meetingDate.toDate() : new Date(meetingDate);
  return d < new Date();
};

const toast = (msg) => {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
};

const clearListeners = () => {
  state.unsubs.forEach(u => { try { u(); } catch(e) {} });
  state.unsubs = [];
};

// ============================================================
// 4) AUTH
// ============================================================
onAuthStateChanged(auth, async (user) => {
  if (user) {
    state.user = {
      uid: user.uid,
      name: user.displayName || user.email.split('@')[0],
      email: user.email,
      photo: user.photoURL || ''
    };
    // upsert user doc
    await setDoc(doc(db, 'users', user.uid), {
      name: state.user.name,
      email: state.user.email,
      photo: state.user.photo,
      updatedAt: serverTimestamp()
    }, { merge: true });
    state.view = 'clubList';
    listenToClubs();
  } else {
    state.user = null;
    clearListeners();
    state.view = 'login';
    render();
  }
});

const handleSignIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    console.error(e);
    toast('로그인 실패: ' + e.message);
  }
};

const handleSignOut = async () => {
  if (!confirm('로그아웃 할까요?')) return;
  clearListeners();
  await signOut(auth);
};

// ============================================================
// 5) DATA: CLUBS
// ============================================================
const listenToClubs = () => {
  clearListeners();
  // active member clubs
  const qActive = query(collection(db, 'clubs'), where('memberIds', 'array-contains', state.user.uid));
  const u1 = onSnapshot(qActive, snap => {
    state.clubs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.view === 'clubList') render();
    if (state.view === 'club' && state.currentClubId) {
      const c = state.clubs.find(x => x.id === state.currentClubId);
      if (c) { state.currentClub = c; render(); }
    }
  });
  // pending clubs
  const qPending = query(collection(db, 'clubs'), where('pendingIds', 'array-contains', state.user.uid));
  const u2 = onSnapshot(qPending, snap => {
    state.pendingClubs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.view === 'clubList') render();
  });
  state.unsubs.push(u1, u2);
};

const createClub = async (name, description) => {
  const inviteCode = generateInviteCode();
  const userInfo = { name: state.user.name, photo: state.user.photo };
  const ref = await addDoc(collection(db, 'clubs'), {
    name,
    description: description || '',
    hostId: state.user.uid,
    hostName: state.user.name,
    inviteCode,
    memberIds: [state.user.uid],
    memberInfo: { [state.user.uid]: userInfo },
    pendingIds: [],
    pendingInfo: {},
    createdAt: serverTimestamp()
  });
  // Separate invite-code lookup doc — public read so non-members can resolve code → clubId
  await setDoc(doc(db, 'inviteCodes', inviteCode), {
    clubId: ref.id,
    createdBy: state.user.uid,
    createdAt: serverTimestamp()
  });
  toast('모임이 생성됐어요');
  return ref.id;
};

const joinClubByCode = async (code) => {
  const codeUpper = code.toUpperCase().trim();
  // Look up clubId via inviteCodes collection (publicly readable for auth users)
  const codeSnap = await getDoc(doc(db, 'inviteCodes', codeUpper));
  if (!codeSnap.exists()) { toast('유효하지 않은 코드예요'); return; }
  const { clubId } = codeSnap.data();
  // Try to join — write-only since user can't read club doc until they're in members/pending
  try {
    await updateDoc(doc(db, 'clubs', clubId), {
      pendingIds: arrayUnion(state.user.uid),
      [`pendingInfo.${state.user.uid}`]: {
        name: state.user.name,
        photo: state.user.photo,
        requestedAt: Timestamp.now()
      }
    });
    toast('가입 신청을 보냈어요. 모임장 승인을 기다려주세요.');
  } catch (e) {
    if (e.code === 'permission-denied') {
      toast('이미 가입했거나 신청 중이에요');
    } else {
      console.error(e);
      toast('가입 중 오류: ' + e.message);
    }
  }
};

const approvePending = async (clubId, userId) => {
  const club = state.currentClub;
  if (!club) return;
  const info = club.pendingInfo?.[userId];
  if (!info) return;
  await updateDoc(doc(db, 'clubs', clubId), {
    memberIds: arrayUnion(userId),
    [`memberInfo.${userId}`]: { name: info.name, photo: info.photo },
    pendingIds: arrayRemove(userId),
    [`pendingInfo.${userId}`]: deleteField()
  });
  toast('승인됨');
};

const rejectPending = async (clubId, userId) => {
  await updateDoc(doc(db, 'clubs', clubId), {
    pendingIds: arrayRemove(userId),
    [`pendingInfo.${userId}`]: deleteField()
  });
  toast('거절됨');
};

const leaveClub = async (clubId) => {
  const club = state.currentClub;
  if (!club) return;
  if (club.hostId === state.user.uid) {
    toast('모임장은 탈퇴할 수 없어요. 모임을 삭제하거나 권한을 넘겨주세요.');
    return;
  }
  if (!confirm(`'${club.name}'에서 탈퇴할까요? 다시 들어오려면 초대 코드로 재가입해야 해요.`)) return;
  await updateDoc(doc(db, 'clubs', clubId), {
    memberIds: arrayRemove(state.user.uid),
    [`memberInfo.${state.user.uid}`]: deleteField()
  });
  toast('탈퇴했어요');
  backToClubList();
};

const kickMember = async (clubId, userId, memberName) => {
  if (userId === state.user.uid) { toast('본인은 강퇴할 수 없어요'); return; }
  if (!confirm(`'${memberName}'님을 모임에서 내보낼까요?`)) return;
  await updateDoc(doc(db, 'clubs', clubId), {
    memberIds: arrayRemove(userId),
    [`memberInfo.${userId}`]: deleteField()
  });
  toast(`${memberName}님을 내보냈어요`);
};

const deleteClub = async (clubId) => {
  const club = state.currentClub;
  if (!club || club.hostId !== state.user.uid) return;
  if (!confirm(`'${club.name}' 모임을 완전히 삭제할까요?\n모든 회차·댓글·소감·기록이 사라지고 되돌릴 수 없어요.`)) return;
  if (!confirm('정말 삭제할까요? 이 작업은 취소할 수 없어요.')) return;
  // 회차 서브컬렉션은 클라이언트에서 일괄 삭제 (소규모라 가능)
  try {
    const mSnap = await getDocs(collection(db, 'clubs', clubId, 'meetings'));
    for (const m of mSnap.docs) {
      await deleteDoc(doc(db, 'clubs', clubId, 'meetings', m.id));
    }
    if (club.inviteCode) {
      await deleteDoc(doc(db, 'inviteCodes', club.inviteCode)).catch(()=>{});
    }
    await deleteDoc(doc(db, 'clubs', clubId));
    toast('모임이 삭제됐어요');
    backToClubList();
  } catch (e) {
    console.error(e);
    toast('삭제 중 오류: ' + e.message);
  }
};

// ============================================================
// 6) DATA: MEETINGS
// ============================================================
const listenToMeetings = (clubId) => {
  const q = query(collection(db, 'clubs', clubId, 'meetings'), orderBy('meetingDate', 'desc'));
  const u = onSnapshot(q, snap => {
    state.meetings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.view === 'club') render();
  });
  state.unsubs.push(u);
};

const createMeeting = async (clubId, data) => {
  await addDoc(collection(db, 'clubs', clubId, 'meetings'), {
    meetingDate: Timestamp.fromDate(data.meetingDate),
    location: data.location || '',
    books: data.books || [],            // [{title, author, description, link, thumbnail}]
    extraInfo: data.extraInfo || '',
    rsvp: {},
    attendees: [],
    createdAt: serverTimestamp(),
    createdBy: state.user.uid
  });
  toast('회차가 생성됐어요');
};

const updateMeeting = async (clubId, meetingId, data) => {
  await updateDoc(doc(db, 'clubs', clubId, 'meetings', meetingId), {
    meetingDate: Timestamp.fromDate(data.meetingDate),
    location: data.location || '',
    books: data.books || [],
    extraInfo: data.extraInfo || '',
    updatedAt: serverTimestamp()
  });
  toast('회차가 수정됐어요');
};

// 기존 단권 데이터(bookTitle/bookDescription/bookLink)를 books 배열로 정규화
const getBooks = (mtg) => {
  if (Array.isArray(mtg.books) && mtg.books.length > 0) return mtg.books;
  if (mtg.bookTitle) {
    return [{ title: mtg.bookTitle, author: '', description: mtg.bookDescription || '', link: mtg.bookLink || '', thumbnail: '' }];
  }
  return [];
};
const firstBookTitle = (mtg) => {
  const b = getBooks(mtg);
  if (b.length === 0) return '(책 미정)';
  return b.length === 1 ? b[0].title : `${b[0].title} 외 ${b.length - 1}권`;
};

// ============================================================
// Google Books 검색 (CORS 허용, 키 없이 호출 가능)
// ============================================================
const searchGoogleBooks = async (queryStr) => {
  if (!queryStr || queryStr.trim().length < 2) return [];
  const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(queryStr.trim())}&maxResults=6&langRestrict=ko&country=KR`;
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data.items) return [];
    return data.items.map(it => {
      const v = it.volumeInfo || {};
      return {
        title: v.title || '',
        author: (v.authors || []).join(', '),
        description: v.description ? v.description.slice(0, 300) : '',
        link: v.infoLink || v.canonicalVolumeLink || '',
        thumbnail: (v.imageLinks?.thumbnail || v.imageLinks?.smallThumbnail || '').replace('http://', 'https://')
      };
    }).filter(b => b.title);
  } catch (e) {
    console.error('Google Books error', e);
    return [];
  }
};

const updateRSVP = async (clubId, meetingId, status) => {
  await updateDoc(doc(db, 'clubs', clubId, 'meetings', meetingId), {
    [`rsvp.${state.user.uid}`]: status
  });
};

const toggleAttendance = async (clubId, meetingId, userId, current) => {
  await updateDoc(doc(db, 'clubs', clubId, 'meetings', meetingId), {
    attendees: current ? arrayRemove(userId) : arrayUnion(userId)
  });
};

const deleteMeeting = async (clubId, meetingId) => {
  if (!confirm('이 회차를 삭제할까요? 댓글·소감도 함께 사라져요.')) return;
  try {
    // 하위 댓글·소감 먼저 정리 (소규모라 클라이언트에서 가능)
    const [cSnap, rSnap] = await Promise.all([
      getDocs(collection(db, 'clubs', clubId, 'meetings', meetingId, 'comments')),
      getDocs(collection(db, 'clubs', clubId, 'meetings', meetingId, 'reflections'))
    ]);
    for (const c of cSnap.docs) await deleteDoc(c.ref);
    for (const r of rSnap.docs) await deleteDoc(r.ref);
    await deleteDoc(doc(db, 'clubs', clubId, 'meetings', meetingId));
    state.currentMeetingId = null;
    toast('삭제됐어요');
    render();
  } catch (e) {
    console.error(e);
    toast('삭제 중 오류: ' + e.message);
  }
};

// ============================================================
// 7) DATA: COMMENTS + REFLECTIONS
// ============================================================
let commentsUnsub = null;
let editingBooks = [];   // 회차 생성/수정 중인 도서 목록
let bookSearchTimer = null;
let reflectionsUnsub = null;

const listenToMeetingSubdata = (clubId, meetingId) => {
  if (commentsUnsub) commentsUnsub();
  if (reflectionsUnsub) reflectionsUnsub();
  const qC = query(collection(db, 'clubs', clubId, 'meetings', meetingId, 'comments'), orderBy('createdAt', 'asc'));
  commentsUnsub = onSnapshot(qC, snap => {
    state.meetingComments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.currentMeetingId === meetingId) render();
  });
  const qR = collection(db, 'clubs', clubId, 'meetings', meetingId, 'reflections');
  reflectionsUnsub = onSnapshot(qR, snap => {
    state.meetingReflections = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.currentMeetingId === meetingId) render();
  });
};

const addComment = async (clubId, meetingId, text) => {
  if (!text.trim()) return;
  await addDoc(collection(db, 'clubs', clubId, 'meetings', meetingId, 'comments'), {
    authorId: state.user.uid,
    authorName: state.user.name,
    authorPhoto: state.user.photo,
    text: text.trim(),
    createdAt: serverTimestamp()
  });
};

const deleteComment = async (clubId, meetingId, commentId) => {
  if (!confirm('이 댓글을 삭제할까요?')) return;
  await deleteDoc(doc(db, 'clubs', clubId, 'meetings', meetingId, 'comments', commentId));
};

const saveReflection = async (clubId, meetingId, text, rating) => {
  if (!text.trim() && !rating) { toast('별점이나 소감을 남겨주세요'); return; }
  await setDoc(doc(db, 'clubs', clubId, 'meetings', meetingId, 'reflections', state.user.uid), {
    authorId: state.user.uid,
    authorName: state.user.name,
    text: text.trim(),
    rating: rating || 0,        // 0 = 별점 없음, 1~5
    updatedAt: serverTimestamp()
  });
  toast('소감이 저장됐어요');
};

// ============================================================
// 8) RENDERING
// ============================================================
const iconArrowLeft = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`;

const renderMonthView = () => {
  const month = state.calendarMonth;
  const y = month.getFullYear(), m = month.getMonth();
  const firstDay = new Date(y, m, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const today = new Date();

  // Build cells: 6 rows × 7 cols = 42
  const cells = [];
  for (let i = 0; i < startDow; i++) {
    cells.push({ day: daysInPrevMonth - startDow + i + 1, otherMonth: true, date: new Date(y, m - 1, daysInPrevMonth - startDow + i + 1) });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, otherMonth: false, date: new Date(y, m, d) });
  }
  while (cells.length < 42) {
    const i = cells.length - startDow - daysInMonth + 1;
    cells.push({ day: i, otherMonth: true, date: new Date(y, m + 1, i) });
  }

  // Map meetings to dates
  const meetingsByDay = {};
  state.meetings.forEach(mtg => {
    const d = mtg.meetingDate.toDate ? mtg.meetingDate.toDate() : new Date(mtg.meetingDate);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!meetingsByDay[k]) meetingsByDay[k] = [];
    meetingsByDay[k].push(mtg);
  });

  const dows = ['일', '월', '화', '수', '목', '금', '토'];

  // Upcoming meetings for this month (small list under calendar)
  const monthMeetings = state.meetings.filter(mtg => {
    const d = mtg.meetingDate.toDate ? mtg.meetingDate.toDate() : new Date(mtg.meetingDate);
    return d.getFullYear() === y && d.getMonth() === m;
  }).sort((a, b) => {
    const ad = a.meetingDate.toDate(), bd = b.meetingDate.toDate();
    return ad - bd;
  });

  return `
    <div class="calendar-nav">
      <button class="icon-btn" data-cal-nav="-1">${iconArrowLeft}</button>
      <div class="calendar-month-label serif">${fmtMonth(month)}</div>
      <button class="icon-btn" data-cal-nav="1">${iconArrowRight}</button>
    </div>
    <div class="calendar-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c => {
        const k = `${c.date.getFullYear()}-${c.date.getMonth()}-${c.date.getDate()}`;
        const hasMeeting = meetingsByDay[k]?.length > 0;
        const isToday = sameDay(c.date, today);
        const cls = ['cal-day'];
        if (c.otherMonth) cls.push('other-month');
        if (isToday) cls.push('today');
        if (hasMeeting) cls.push('has-meeting');
        const firstMeetingId = hasMeeting ? meetingsByDay[k][0].id : '';
        return `<div class="${cls.join(' ')}"${hasMeeting ? ` data-meeting-id="${firstMeetingId}"` : ''}>
          <span>${c.day}</span>
          ${hasMeeting ? '<div class="cal-dot"></div>' : ''}
        </div>`;
      }).join('')}
    </div>
    ${monthMeetings.length > 0 ? `
      <div style="margin-top:20px;">
        <div class="detail-section-title">이번 달 회차</div>
        ${monthMeetings.map(renderMeetingCard).join('')}
      </div>
    ` : `<div class="empty" style="padding:24px 12px;">이번 달엔 예정된 회차가 없어요</div>`}
  `;
};

const renderListView = () => {

// 9b) SHARE (KakaoTalk / native share)
// ============================================================
const shareMeeting = async (mtg) => {
  const date = fmtDateShort(mtg.meetingDate) + ' ' + fmtTime(mtg.meetingDate);
  const url = `${location.origin}${location.pathname}#/club/${state.currentClubId}/meeting/${mtg.id}`;
  const books = getBooks(mtg);
  const lines = [`📚 ${state.currentClub.name}`];
  if (books.length === 0) lines.push(`📖 (책 미정)`);
  else if (books.length === 1) lines.push(`📖 ${books[0].title}${books[0].author ? ' / ' + books[0].author : ''}`);
  else {
    lines.push(`📖 도서 ${books.length}권:`);
    books.forEach(b => lines.push(`  · ${b.title}`));
  }
  lines.push(`🗓️ ${date}`);
  if (mtg.location) lines.push(`📍 ${mtg.location}`);
  if (mtg.extraInfo) lines.push(`ℹ️ ${mtg.extraInfo}`);
  lines.push('', url);
  const text = lines.join('\n');

  if (navigator.share) {
    try {
      await navigator.share({ title: state.currentClub.name, text });
      return;
    } catch (e) {
      if (e.name === 'AbortError') return; // user cancelled
    }
  }
  // fallback: copy to clipboard
  try {
    await navigator.clipboard.writeText(text);
    toast('내용이 복사됐어요. 카톡에 붙여넣으세요.');
  } catch (e) {
    toast('공유를 지원하지 않는 환경이에요');
  }
};

const renderBookEditor = () => {

    return;
  }
  wrap.innerHTML = editingBooks.map((b, i) => `
    <div class="book-chip">

      <div class="book-chip-info">

  `).join('');

const wireBookSearch = () => {
  const input = document.getElementById('book-search');
  const results = document.getElementById('book-search-results');
  if (!input || !results) return;

  const doSearch = async () => {
    const q = input.value.trim();
    if (q.length < 2) { results.innerHTML = ''; return; }
    results.innerHTML = `<div class="book-search-loading">검색 중…</div>`;
    const books = await searchGoogleBooks(q);
    if (books.length === 0) {
      results.innerHTML = `<div class="book-search-loading">결과가 없어요. "직접 입력"을 눌러 수동으로 추가하세요.</div>`;
      return;
    }
    results.innerHTML = books.map((b, i) => `
      <button type="button" class="book-result" data-addidx="${i}">
        ${b.thumbnail ? `<img class="book-result-thumb" src="${escapeHtml(b.thumbnail)}" alt="">` : `<div class="book-result-thumb book-thumb-empty">📖</div>`}
        <div class="book-result-info">
          <div class="book-result-title">${escapeHtml(b.title)}</div>
          ${b.author ? `<div class="book-result-author">${escapeHtml(b.author)}</div>` : ''}
        </div>
      </button>
    `).join('');
    results.querySelectorAll('[data-addidx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const b = books[parseInt(btn.dataset.addidx)];
        editingBooks.push({...b});
        input.value = '';
        results.innerHTML = '';
        renderBookEditor();
      });
    });
  };

  input.addEventListener('input', () => {
    clearTimeout(bookSearchTimer);
    bookSearchTimer = setTimeout(doSearch, 450); // debounce
  });
};

const openManualBookEntry = () => {
  const title = prompt('책 제목을 입력하세요');
  if (!title || !title.trim()) return;
  const author = prompt('저자 (선택, 비워도 됨)') || '';
  editingBooks.push({ title: title.trim(), author: author.trim(), description: '', link: '', thumbnail: '' });

// 9d) STATS
// ============================================================
const computeStats = () => {
  const meetings = state.meetings || [];
  const pastMeetings = meetings.filter(m => isPastMeeting(m.meetingDate));
  const memberInfo = state.currentClub.memberInfo || {};
  const memberIds = state.currentClub.memberIds || [];

  // 참석 횟수 집계
  const attendCount = {};
  memberIds.forEach(uid => { attendCount[uid] = 0; });
  pastMeetings.forEach(m => {
    (m.attendees || []).forEach(uid => {
      attendCount[uid] = (attendCount[uid] || 0) + 1;
    });
  });
  const ranking = memberIds
    .map(uid => ({ uid, name: memberInfo[uid]?.name || '(탈퇴)', count: attendCount[uid] || 0 }))
    .sort((a, b) => b.count - a.count);

  // 읽은 책 목록 (지난 회차)
  const booksRead = [];
  pastMeetings
    .slice()
    .sort((a, b) => (a.meetingDate.toDate ? a.meetingDate.toDate() : new Date(a.meetingDate)) - (b.meetingDate.toDate ? b.meetingDate.toDate() : new Date(b.meetingDate)))
    .forEach(m => {
      getBooks(m).forEach(b => booksRead.push({ ...b, date: m.meetingDate }));
    });

  // 올해 읽은 책 수
  const thisYear = new Date().getFullYear();
  const thisYearCount = booksRead.filter(b => {
    const d = b.date.toDate ? b.date.toDate() : new Date(b.date);
    return d.getFullYear() === thisYear;
  }).length;

  return {
    totalMeetings: pastMeetings.length,
    totalBooks: booksRead.length,
    thisYearCount,
    ranking,
    booksRead: booksRead.reverse()  // 최신순
  };
};

      <div class="modal-title serif">승인 대기 (${pIds.length})</div>
      <div class="modal-sub">새 가입 신청을 검토하세요.</div>
      ${pIds.length === 0 ? '<div class="empty">대기 중인 신청이 없어요</div>' : pIds.map(uid => {
        const info = pInfo[uid] || {};
        return `
          <div class="pending-item">
            <div class="avatar">${info.photo ? `<img src="${info.photo}" alt="">` : `<div style="background:var(--bg-soft); width:100%; height:100%; display:grid; place-items:center; font-size:11px; color:var(--ink-mute);">${(info.name||'?')[0]}</div>`}</div>
            <div class="name">${escapeHtml(info.name || '(이름없음)')}</div>
            <button class="pending-reject" data-reject="${uid}">거절</button>
            <button class="pending-approve" data-approve="${uid}">승인</button>
          </div>
        `;
      }).join('')}
    `;
  }

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `<div class="modal" style="position:relative;">
    <button class="modal-close">${iconX}</button>
    ${content}
  </div>`;
  document.body.appendChild(backdrop);

  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
  backdrop.querySelector('.modal-close').addEventListener('click', closeModal);

  if (state.modal === 'createClub') {
    document.getElementById('create-club-submit').addEventListener('click', async () => {
      const name = document.getElementById('club-name').value.trim();
      if (!name) { toast('모임 이름을 입력하세요'); return; }
      const desc = document.getElementById('club-desc').value.trim();
      await createClub(name, desc);
      closeModal();
    });
  } else if (state.modal === 'joinClub') {
    document.getElementById('join-club-submit').addEventListener('click', async () => {
      const code = document.getElementById('join-code').value;
      if (!code.trim()) { toast('코드를 입력하세요'); return; }
      await joinClubByCode(code);
      closeModal();
    });
  } else if (state.modal === 'createMeeting' || state.modal === 'editMeeting') {
    const editing = state.modal === 'editMeeting';
    renderBookEditor();
    wireBookSearch();
    document.getElementById('book-manual-btn')?.addEventListener('click', openManualBookEntry);
    document.getElementById('meeting-submit').addEventListener('click', async () => {
      const date = document.getElementById('m-date').value;
      const time = document.getElementById('m-time').value;
      if (!date || !time) { toast('날짜·시간을 입력하세요'); return; }
      if (editingBooks.length === 0) { toast('책을 한 권 이상 추가하세요'); return; }
      const dt = new Date(`${date}T${time}`);
      const payload = {
        meetingDate: dt,
        location: document.getElementById('m-location').value.trim(),
        books: editingBooks.map(b => ({
          title: b.title || '',
          author: b.author || '',
          description: b.description || '',
          link: b.link || '',
          thumbnail: b.thumbnail || ''
        })),
        extraInfo: document.getElementById('m-extra').value.trim()
      };
      if (editing) {
        await updateMeeting(state.currentClubId, state.currentMeetingId, payload);
      } else {
        await createMeeting(state.currentClubId, payload);
      }
      closeModal();
    });
  } else if (state.modal === 'members') {
    document.querySelectorAll('[data-kick]').forEach(b => {
      b.addEventListener('click', async () => {
        await kickMember(state.currentClubId, b.dataset.kick, b.dataset.kickName);
        closeModal();
      });
    });
    document.getElementById('leave-club-btn')?.addEventListener('click', async () => {
      await leaveClub(state.currentClubId);
      // leaveClub handles navigation; close modal state
      state.modal = null;
    });
    document.getElementById('delete-club-btn')?.addEventListener('click', async () => {
      await deleteClub(state.currentClubId);
      state.modal = null;
    });
  } else if (state.modal === 'invite') {
    document.getElementById('copy-code').addEventListener('click', () => {
      navigator.clipboard.writeText(state.currentClub.inviteCode);
      toast('복사됨');
    });
  } else if (state.modal === 'pending') {
    document.querySelectorAll('[data-approve]').forEach(b => {
      b.addEventListener('click', async () => { await approvePending(state.currentClubId, b.dataset.approve); });
    });
    document.querySelectorAll('[data-reject]').forEach(b => {
      b.addEventListener('click', async () => { await rejectPending(state.currentClubId, b.dataset.reject); });
    });
  }
};

// Initial render
render();
</script>
</body>
</html>
